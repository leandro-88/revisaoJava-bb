<script>

let musicaAtualIdx = 1;
const totalMusicas = 5;
const nomesMusicas = [
    "1. Thread da Posse",
    "2. Polimorfismo da Aprovação",
    "3. Lambda Anônimas",
    "4. Herança de Sucesso",
    "5. Dicas Ti Cesgranrio"
];

function pularParaSlide() {
    const input = document.getElementById('inputPularSlide');
    let slideDesejado = parseInt(input.value);
    const totalDeSlides = 43; // Baseado no seu contador de slides

    if (isNaN(slideDesejado)) return;

    // Regra: Se maior que o total, vai para o último
    if (slideDesejado > totalDeSlides) {
        slideDesejado = totalDeSlides;
    }
    
    // Regra: Se menor que 1, vai para o primeiro
    if (slideDesejado < 1) {
        slideDesejado = 1;
    }

    // Como o índice de slides no código geralmente começa em 0:
    // Ex: Slide 1 é o index 0, Slide 43 é o index 42.
    currentSlide = slideDesejado - 1; 

    // Chama a função que você já tem para atualizar a tela
    updateUI();
    
    // Limpa o campo após o pulo
    input.value = '';
    input.blur(); // Tira o foco para esconder o teclado no celular
}

function forcarPlay() {
    let audio = audios['musica' + musicaAtualIdx];
    let btn = document.getElementById('btnPlayFixo');

    if (!audio) return;

    // Pausa qualquer outra que esteja tocando antes
    Object.values(audios).forEach(a => { 
        a.pause(); 
        a.currentTime = 0; 
    });

    audio.play();

    // Sincroniza o visual do botão do rodapé
    if (btn) {
        btn.innerHTML = "||"; // Muda para Pause
        btn.style.background = "#00bcd4"; // Fica Azul Ciano
        btn.style.color = "#000";
    }
    
    atualizarDisplayPlayer();
}

function togglePlayPause() {
    let audio = audios['musica' + musicaAtualIdx];
    let btn = document.getElementById('btnPlayFixo');

    if (audio.paused) {
        forcarPlay(); // Usa a função que sincroniza tudo
    } else {
        audio.pause();
        if (btn) {
            btn.innerHTML = "▶"; // Volta para Play
            btn.style.background = "#673ab7"; // Volta para Roxo
            btn.style.color = "#fff";
        }
    }
}

function tocarPlaylistSync(idx) {
    musicaAtualIdx = idx;
    forcarPlay(); // Garante que ao clicar na lista, o botão lá embaixo mude
}

// Funções de Avançar e Voltar agora "Forçam" o play sincronizado
function nextMusic() {
    musicaAtualIdx = (musicaAtualIdx % totalMusicas) + 1;
    forcarPlay();
}

function prevMusic() {
    musicaAtualIdx = (musicaAtualIdx === 1) ? totalMusicas : musicaAtualIdx - 1;
    forcarPlay();
}

// Funções de compatibilidade (para não dar erro caso algum botão antigo chame)
function tocarSelecionada() { forcarPlay(); }

let currentSlide = 0;
const slides = document.querySelectorAll('.slide');
const totalSlides = slides.length;

function updateUI() {
  slides.forEach((slide, i) => {
    slide.classList.remove('active', 'out');
    if (i === currentSlide) {
      slide.classList.add('active');
    } else if (i < currentSlide) {
      slide.classList.add('out');
    }
  });
  document.getElementById('counter').textContent = (currentSlide + 1) + '/' + totalSlides;
  document.getElementById('topfill').style.width = ((currentSlide + 1) / totalSlides * 100) + '%';
  
  document.getElementById('prev').disabled = currentSlide === 0;
  document.getElementById('next').disabled = currentSlide === totalSlides - 1;
  
  updateDots();
}

function updateDots() {
  const dotsContainer = document.getElementById('dots');
  if (dotsContainer.children.length === 0) {
    for (let i = 0; i < totalSlides; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.onclick = () => goTo(i);
      dotsContainer.appendChild(dot);
    }
  }
  document.querySelectorAll('.dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === currentSlide);
  });
}

function next() {
  if (currentSlide < totalSlides - 1) {
    currentSlide++;
    updateUI();
  }
}

function prev() {
  if (currentSlide > 0) {
    currentSlide--;
    updateUI();
  }
}

function goTo(n) {
  currentSlide = n;
  updateUI();
}
